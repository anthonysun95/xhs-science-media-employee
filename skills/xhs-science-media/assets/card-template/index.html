<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>小红书图文卡片</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="gallery">
      <section class="page cover-page">
        <img class="cover-visual" src="assets/cover-visual.png" alt="" />
        <div class="cover-copy">
          <p class="kicker">主题标签</p>
          <h1>替换为已选择的标题</h1>
        </div>
      </section>

      <section class="page content-page">
        <div class="page-number">02</div>
        <div class="content">
          <p class="kicker">开场</p>
          <h2>替换为原文中的核心句</h2>
          <div class="body-copy">
            <p>替换为文章原文。根据内容复制这一页，保持每个 section.page 对应一张卡片。</p>
          </div>
        </div>
      </section>

      <section class="page paper-page">
        <div class="page-number">最后一页</div>
        <div class="paper-content">
          <p class="kicker">研究依据</p>
          <h2>替换为论文中文标题</h2>
          <figure><img src="assets/anchor-paper-first-page.png" alt="论文首页" /></figure>
        </div>
      </section>
    </main>
  </body>
</html>
